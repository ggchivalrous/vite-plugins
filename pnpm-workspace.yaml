packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@types/node": ^25.5.0
  "@typescript/native-preview": 7.0.0-dev.20260316.1
  "@vitejs/plugin-vue": 6.0.5
  bumpp: 11.0.1
  happy-dom: 20.8.8
  typescript: ^6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.14
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue: 3.5.31

catalogMode: prefer

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
